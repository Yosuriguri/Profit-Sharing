<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성과공유제 홍보 전단지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        .step-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
            font-size: 0.875rem;
        }
        @media print {
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="p-4">

    <div class="no-print flex justify-center mb-6">
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition duration-300">
            PDF 저장 및 인쇄하기
        </button>
    </div>

    <div class="a4-page">
        <!-- Header / Hero Section -->
        <header class="gradient-bg text-white p-12 rounded-3xl mb-10 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-blue-100 font-medium mb-2 tracking-widest uppercase">Win-Win Partnership</p>
                <h1 class="text-5xl font-black mb-4 leading-tight">
                    함께 성장하는 <br>
                    <span class="text-yellow-300">성과공유제</span>
                </h1>
                <p class="text-xl font-light opacity-90">
                    위탁기업과 수탁기업이 공동의 목표를 달성하고 <br>
                    그 성과를 나누어 지속가능한 성장을 이뤄갑니다.
                </p>
            </div>
            <!-- Decorative Circle -->
            <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-white opacity-10 rounded-full"></div>
        </header>

        <!-- What is it? Section -->
        <section class="mb-12">
            <div class="flex items-center mb-6">
                <div class="w-1.5 h-8 bg-blue-600 mr-3"></div>
                <h2 class="text-2xl font-bold text-gray-800">성과공유제란 무엇인가요?</h2>
            </div>
            <div class="bg-blue-50 p-8 rounded-2xl border-l-4 border-blue-500">
                <p class="text-gray-700 leading-relaxed text-lg">
                    위탁기업과 수탁기업이 미리 합의한 <strong class="text-blue-700">공동목표(원가절감, 신기술 개발 등)</strong>를 달성하기 위해 
                    협력하고, 그 결과를 사전에 약속한 방법으로 나누는 <strong class="text-blue-700">상생협력 제도</strong>입니다.
                </p>
            </div>
        </section>

        <!-- Benefits Section -->
        <section class="mb-12">
            <div class="flex items-center mb-6">
                <div class="w-1.5 h-8 bg-blue-600 mr-3"></div>
                <h2 class="text-2xl font-bold text-gray-800">참여 기업 혜택</h2>
            </div>
            <div class="grid grid-cols-2 gap-6">
                <div class="border border-gray-200 p-6 rounded-2xl hover:shadow-md transition">
                    <div class="text-blue-600 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5
